<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한화에너지 점심 맛집 가이드</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --hw-orange: #FF6B00;
      --hw-orange-dark: #E55D00;
      --hw-orange-light: #FFF3EC;
      --hw-dark: #1C1C1C;
      --hw-mid: #444;
      --hw-gray: #F5F6F7;
      --hw-border: #E4E5E7;
      --card-radius: 10px;
    }

    * { box-sizing: border-box; }

    body {
      background: var(--hw-gray);
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      color: var(--hw-dark);
      margin: 0;
    }

    /* ── 헤더 ── */
    .site-header {
      background: var(--hw-orange);
      color: #fff;
    }
    .header-top {
      max-width: 1200px;
      margin: 0 auto;
      padding: 22px 24px 18px;
    }
    .header-brand-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .hw-emblem {
      width: 34px;
      height: 34px;
      background: rgba(255,255,255,0.22);
      border: 1.5px solid rgba(255,255,255,0.4);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 900;
      letter-spacing: -1px;
      flex-shrink: 0;
    }
    .hw-brand-text {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.2px;
      opacity: 0.88;
      text-transform: uppercase;
    }
    .header-title {
      font-size: clamp(1.35rem, 4vw, 1.85rem);
      font-weight: 800;
      letter-spacing: -0.5px;
      margin: 0 0 5px;
    }
    .header-sub {
      font-size: 13px;
      opacity: 0.78;
      margin: 0;
    }

    /* ── 위치 탭 ── */
    .loc-tab-bar {
      border-top: 1px solid rgba(255,255,255,0.18);
      background: rgba(0,0,0,0.12);
    }
    .loc-tab-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
    }
    .loc-tab {
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      font-weight: 700;
      padding: 12px 18px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: color 0.18s, border-color 0.18s, background 0.18s;
      white-space: nowrap;
      letter-spacing: 0.2px;
    }
    .loc-tab.active {
      color: #fff;
      border-bottom-color: #fff;
    }
    .loc-tab:hover:not(.active) {
      color: rgba(255,255,255,0.88);
      background: rgba(255,255,255,0.07);
    }

    /* ── 지도 ── */
    .map-wrap { position: relative; }
    .map-container {
      height: 370px;
      z-index: 0;
    }
    @media (max-width: 576px) { .map-container { height: 250px; } }

    /* ── 랜덤 픽 섹션 ── */
    .pick-section {
      background: #1C1C1C;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .pick-slot {
      min-width: 200px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.14);
      border-radius: 6px;
      padding: 9px 18px;
      text-align: center;
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.25s, background 0.25s;
    }
    .pick-slot.spinning {
      border-color: var(--hw-orange);
      background: rgba(255,107,0,0.09);
      animation: slotPulse 0.14s infinite alternate;
    }
    .pick-slot.landed {
      border-color: var(--hw-orange);
      background: rgba(255,107,0,0.1);
      color: var(--hw-orange);
    }
    @keyframes slotPulse {
      from { transform: scaleY(1); }
      to   { transform: scaleY(1.03); }
    }
    .btn-pick {
      background: var(--hw-orange);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(255,107,0,0.35);
      transition: background 0.15s, transform 0.15s;
      white-space: nowrap;
    }
    .btn-pick:hover:not(:disabled) {
      background: var(--hw-orange-dark);
      transform: translateY(-1px);
    }
    .btn-pick:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
    .pick-sub {
      color: rgba(255,255,255,0.3);
      font-size: 11px;
      font-weight: 500;
      text-align: center;
      width: 100%;
      margin-top: -4px;
    }

    /* ── 필터 바 ── */
    .filter-bar {
      background: #fff;
      padding: 10px 20px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid var(--hw-border);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .btn-filter {
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border: 1.5px solid var(--hw-border);
      background: #fff;
      color: #666;
      transition: all 0.14s;
      cursor: pointer;
    }
    .btn-filter:hover,
    .btn-filter.active {
      border-color: var(--hw-orange);
      background: var(--hw-orange);
      color: #fff;
    }

    /* ── 카드 영역 ── */
    .cards-section {
      padding: 18px 16px 24px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .section-label {
      font-size: 13px;
      font-weight: 700;
      color: #555;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .count-chip {
      background: var(--hw-orange);
      color: #fff;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      padding: 1px 7px;
    }
    .scroll-hint {
      font-size: 11px;
      color: #ccc;
      margin-left: auto;
    }

    /* ── 식당 카드 ── */
    .restaurant-card {
      background: #fff;
      border-radius: var(--card-radius);
      box-shadow: 0 1px 5px rgba(0,0,0,0.07);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      border: 1px solid var(--hw-border);
      overflow: hidden;
      height: 100%;
    }
    .restaurant-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(255,107,0,0.13);
      border-color: var(--hw-orange);
    }
    .card-top-bar { height: 4px; }
    .card-content { padding: 14px 15px 10px; }
    .genre-chip {
      font-size: 11px;
      font-weight: 700;
      border-radius: 4px;
      padding: 2px 8px;
      display: inline-block;
      margin-bottom: 8px;
    }
    .card-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--hw-dark);
      margin-bottom: 5px;
      line-height: 1.3;
    }
    .card-addr {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
      line-height: 1.45;
    }
    .card-hours {
      font-size: 12px;
      color: #666;
      display: flex;
      align-items: flex-start;
      gap: 4px;
    }
    .card-dist {
      margin-top: 8px;
      font-size: 11px;
      font-weight: 700;
      color: var(--hw-orange);
    }
    .card-foot {
      border-top: 1px solid var(--hw-border);
      padding: 8px 15px;
      background: #fafafa;
      font-size: 11px;
      color: #bbb;
    }

    /* ── 픽 하이라이트 ── */
    .card-picked {
      border-color: var(--hw-orange) !important;
      box-shadow: 0 0 0 2px var(--hw-orange), 0 6px 18px rgba(255,107,0,0.18) !important;
      position: relative;
    }
    .card-picked::before {
      content: '오늘의 픽';
      position: absolute;
      top: -1px; right: 10px;
      background: var(--hw-orange);
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 0 0 5px 5px;
      z-index: 2;
    }

    /* ── 모달 ── */
    .modal-head {
      background: var(--hw-orange);
      color: #fff;
      border-radius: 10px 10px 0 0;
      padding: 16px 20px;
    }
    .modal-head.is-pick {
      background: linear-gradient(135deg, #B8860B, #DAA520, #FFD700);
    }
    .modal-name {
      font-size: 19px;
      font-weight: 800;
      margin: 4px 0 3px;
    }
    .modal-dist { font-size: 12px; opacity: 0.8; }
    .detail-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 11px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
    }
    .detail-row:last-of-type { border-bottom: none; }
    .detail-icon { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; margin-top: 2px; }
    .detail-label { font-size: 10px; color: #bbb; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; }
    .detail-value { font-weight: 600; color: #222; }
    .btn-naver {
      background: #03C75A; color: #fff; border: none; border-radius: 6px;
      font-weight: 700; font-size: 13px; padding: 10px 16px;
      display: flex; align-items: center; gap: 6px;
      text-decoration: none; transition: background 0.14s;
    }
    .btn-naver:hover { background: #02a84b; color: #fff; }
    .btn-naver-review {
      background: #fff; color: #03C75A; border: 1.5px solid #03C75A; border-radius: 6px;
      font-weight: 700; font-size: 13px; padding: 10px 16px;
      display: flex; align-items: center; gap: 6px;
      text-decoration: none; transition: all 0.14s;
    }
    .btn-naver-review:hover { background: #03C75A; color: #fff; }

    /* Leaflet 팝업 */
    .leaflet-popup-content-wrapper {
      border-radius: 8px !important;
      box-shadow: 0 4px 14px rgba(0,0,0,0.16) !important;
    }
    .mp-title { font-weight: 800; font-size: 13px; margin-bottom: 3px; }
    .mp-genre { font-size: 11px; color: #777; margin-bottom: 5px; }
    .mp-link  { font-size: 11px; color: #03C75A; font-weight: 700; text-decoration: none; }

    /* ── 푸터 ── */
    footer {
      text-align: center;
      padding: 18px 16px;
      font-size: 11px;
      color: #c0c0c0;
      border-top: 1px solid var(--hw-border);
      background: #fff;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<!-- ══ 헤더 ══ -->
<header class="site-header">
  <div class="header-top">
    <div class="header-brand-row">
      <div class="hw-emblem">H</div>
      <span class="hw-brand-text">Hanwha Energy</span>
    </div>
    <h1 class="header-title">점심 맛집 가이드</h1>
    <p class="header-sub">도보 거리 식당을 빠르게 찾아보세요</p>
  </div>
  <div class="loc-tab-bar">
    <div class="loc-tab-inner">
      <button class="loc-tab active" data-loc="sejong">🏢 세종 본사</button>
      <button class="loc-tab" data-loc="seoul">🏢 서울 한화빌딩</button>
    </div>
  </div>
</header>

<!-- ══ 지도 ══ -->
<div class="map-wrap">
  <div id="map-sejong" class="map-container"></div>
  <div id="map-seoul"  class="map-container" style="display:none;"></div>
</div>

<!-- ══ 랜덤 픽 ══ -->
<div class="pick-section">
  <div class="pick-slot" id="pickSlot">
    <span id="pickSlotText" style="opacity:0.3;">여기에 오늘의 픽이 표시돼요</span>
  </div>
  <button class="btn-pick" id="btnPick">🎲 오늘의 점심 랜덤 픽!</button>
  <div class="pick-sub">결정 못 하겠으면 운에 맡겨요</div>
</div>

<!-- ══ 필터 ══ -->
<div class="filter-bar" id="filterBar"></div>

<!-- ══ 카드 그리드 ══ -->
<section class="cards-section">
  <div class="section-label">
    추천 식당 <span class="count-chip" id="countBadge">42</span>
    <span class="scroll-hint">카드 클릭 시 상세 정보 →</span>
  </div>
  <div class="row g-3" id="cardGrid"></div>
</section>

<!-- ══ 상세 모달 ══ -->
<div class="modal fade" id="restaurantModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius:10px;overflow:hidden;border:none;">
      <div class="modal-head" id="modalHead">
        <button type="button" class="btn-close btn-close-white float-end" data-bs-dismiss="modal"></button>
        <span class="genre-chip" id="modalGenreChip"></span>
        <div class="modal-name" id="modalName"></div>
        <div class="modal-dist" id="modalDist"></div>
      </div>
      <div class="modal-body" style="padding:12px 20px;">
        <div class="detail-row">
          <span class="detail-icon">📍</span>
          <div>
            <div class="detail-label">주소</div>
            <div class="detail-value" id="modalAddress"></div>
          </div>
        </div>
        <div class="detail-row" id="modalPhoneRow">
          <span class="detail-icon">📞</span>
          <div>
            <div class="detail-label">전화번호</div>
            <div class="detail-value">
              <a id="modalPhone" style="color:var(--hw-orange);text-decoration:none;font-weight:700;"></a>
            </div>
          </div>
        </div>
        <div class="detail-row">
          <span class="detail-icon">🕐</span>
          <div>
            <div class="detail-label">영업시간</div>
            <div class="detail-value" id="modalHours" style="line-height:1.6;"></div>
          </div>
        </div>
        <div class="detail-row">
          <span class="detail-icon">🍴</span>
          <div>
            <div class="detail-label">대표 메뉴</div>
            <div class="detail-value" id="modalMenu"></div>
          </div>
        </div>
      </div>
      <div class="modal-footer" style="border:none;padding:10px 20px 18px;gap:8px;flex-wrap:nowrap;">
        <a id="modalNaverBtn" href="#" target="_blank" rel="noopener" class="btn-naver flex-fill justify-content-center">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M16.273 12.845L7.376 0H0v24h7.727V11.155L16.624 24H24V0h-7.727z"/></svg>
          네이버 지도
        </a>
        <a id="modalReviewBtn" href="#" target="_blank" rel="noopener" class="btn-naver-review flex-fill justify-content-center">
          ⭐ 리뷰 보기
        </a>
      </div>
    </div>
  </div>
</div>

<!-- ══ 푸터 ══ -->
<footer>
  정보 기준: 2025년 · 영업시간·메뉴는 변동될 수 있으니 방문 전 확인을 권장합니다.
</footer>

/* ──────────────────────────────────────────
   앱 상태
────────────────────────────────────────── */
let currentLoc    = 'sejong';
let currentFilter = '전체';
let lastPickedId  = null;
const maps       = {};
const markerMaps = {};

/* ──────────────────────────────────────────
   지도 초기화 (lazy)
────────────────────────────────────────── */
function initMap(locKey) {
  if (maps[locKey]) return;
  const loc   = LOCATIONS[locKey];
  const mapEl = document.getElementById(`map-${locKey}`);
  const m = L.map(mapEl, { zoomControl: true }).setView([loc.hq.lat, loc.hq.lng], 16);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(m);

  L.circle([loc.hq.lat, loc.hq.lng], {
    radius: 500,
    color: '#FF6B00', weight: 2,
    fillColor: '#FF6B00', fillOpacity: 0.05,
    dashArray: '5,5',
  }).addTo(m);

  const hqIcon = L.divIcon({
    className: '',
    html: `<div style="width:30px;height:30px;background:#FF6B00;border:3px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 8px rgba(255,107,0,0.45);"></div>`,
    iconSize: [30, 30], iconAnchor: [15, 30], popupAnchor: [0, -32],
  });
  L.marker([loc.hq.lat, loc.hq.lng], { icon: hqIcon })
    .addTo(m)
    .bindPopup(`<div style="min-width:175px;"><div style="font-weight:800;font-size:13px;color:#FF6B00;margin-bottom:3px;">🏢 ${loc.hqName}</div><div style="font-size:11px;color:#555;">${loc.hqAddr}</div></div>`, { maxWidth: 230 });

  markerMaps[locKey] = {};
  loc.restaurants.forEach(r => {
    const s = GENRE_STYLE[r.genre] || { color:'#555',bg:'#eee',text:'#333' };
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:28px;height:28px;background:${s.color};border:2px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center;font-size:12px;">${genreEmoji(r.genre)}</div>`,
      iconSize: [28,28], iconAnchor: [14,14], popupAnchor: [0,-15],
    });
    const naverUrl = `https://map.naver.com/v5/search/${encodeURIComponent(r.naverSearch)}`;
    const marker = L.marker([r.lat, r.lng], { icon })
      .addTo(m)
      .bindPopup(`
        <div style="min-width:175px;">
          <div class="mp-title">${r.name}</div>
          <div class="mp-genre">${r.genre} · ${r.distance}</div>
          ${r.phone ? `<div style="font-size:11px;margin-bottom:3px;">📞 <a href="tel:${r.phone}" style="color:#FF6B00;font-weight:700;">${r.phone}</a></div>` : ''}
          <a href="${naverUrl}" target="_blank" rel="noopener" class="mp-link">🗺 네이버 지도에서 보기 →</a>
        </div>
      `, { maxWidth: 240 });
    markerMaps[locKey][r.id] = marker;
  });

  maps[locKey] = m;
}

/* ──────────────────────────────────────────
   필터 바 렌더링
────────────────────────────────────────── */
function renderFilters() {
  const bar = document.getElementById('filterBar');
  bar.innerHTML = '';
  LOCATIONS[currentLoc].genres.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'btn-filter' + (g === currentFilter ? ' active' : '');
    btn.dataset.genre = g;
    btn.textContent = g === '전체' ? '전체' : `${genreEmoji(g)} ${g}`;
    btn.addEventListener('click', () => applyFilter(g));
    bar.appendChild(btn);
  });
}

function applyFilter(genre) {
  currentFilter = genre;
  renderFilters();
  renderCards();
  const loc = LOCATIONS[currentLoc];
  loc.restaurants.forEach(r => {
    const marker = markerMaps[currentLoc]?.[r.id];
    if (!marker) return;
    const show = genre === '전체' || r.genre === genre;
    if (show  && !maps[currentLoc].hasLayer(marker)) maps[currentLoc].addLayer(marker);
    if (!show &&  maps[currentLoc].hasLayer(marker)) maps[currentLoc].removeLayer(marker);
  });
}

/* ──────────────────────────────────────────
   카드 렌더링
────────────────────────────────────────── */
function renderCards() {
  const loc  = LOCATIONS[currentLoc];
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  const filtered = currentFilter === '전체'
    ? loc.restaurants
    : loc.restaurants.filter(r => r.genre === currentFilter);
  document.getElementById('countBadge').textContent = filtered.length;

  filtered.forEach(r => {
    const s = GENRE_STYLE[r.genre] || { color:'#555',bg:'#eee',text:'#333' };
    const col = document.createElement('div');
    col.className = 'col-12 col-sm-6 col-lg-4';
    col.innerHTML = `
      <div class="restaurant-card" data-id="${r.id}" role="button" tabindex="0">
        <div class="card-top-bar" style="background:${s.color};"></div>
        <div class="card-content">
          <span class="genre-chip" style="background:${s.bg};color:${s.text};">${genreEmoji(r.genre)} ${r.genre}</span>
          <div class="card-name">${r.name}</div>
          <div class="card-addr">${r.address.replace(/\n/g,' ')}</div>
          <div class="card-hours">🕐 <span>${r.hours.split('\n')[0]}</span></div>
          <div class="card-dist">📍 ${r.distance}</div>
        </div>
        <div class="card-foot">
          ${r.phone ? `📞 ${r.phone}` : '전화번호 확인 필요'} &nbsp;·&nbsp; 클릭하여 상세 정보 보기
        </div>
      </div>`;
    const card = col.querySelector('.restaurant-card');
    card.addEventListener('click', () => openModal(r));
    card.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') openModal(r); });
    grid.appendChild(col);
  });
}

/* ──────────────────────────────────────────
   모달
────────────────────────────────────────── */
const bsModal = new bootstrap.Modal(document.getElementById('restaurantModal'));
document.getElementById('restaurantModal').addEventListener('hidden.bs.modal', () => {
  document.getElementById('modalHead').classList.remove('is-pick');
});

function openModal(r) {
  const naverUrl = `https://map.naver.com/v5/search/${encodeURIComponent(r.naverSearch)}`;
  const s = GENRE_STYLE[r.genre] || { color:'#555',bg:'#eee',text:'#333' };

  const chip = document.getElementById('modalGenreChip');
  chip.textContent = `${genreEmoji(r.genre)} ${r.genre}`;
  chip.style.cssText = `background:rgba(255,255,255,0.2);color:#fff;font-size:11px;font-weight:700;border-radius:4px;padding:2px 9px;display:inline-block;margin-bottom:4px;`;

  document.getElementById('modalName').textContent     = r.name;
  document.getElementById('modalDist').textContent     = r.distance;
  document.getElementById('modalAddress').innerHTML    = r.address.replace(/\n/g,'<br>');
  document.getElementById('modalHours').innerHTML      = r.hours.replace(/\n/g,'<br>');
  document.getElementById('modalMenu').textContent     = r.menu;
  document.getElementById('modalNaverBtn').href        = naverUrl;
  document.getElementById('modalReviewBtn').href       = naverUrl;

  const phoneRow = document.getElementById('modalPhoneRow');
  const phoneEl  = document.getElementById('modalPhone');
  if (r.phone) {
    phoneRow.style.display = '';
    phoneEl.textContent = r.phone;
    phoneEl.href = `tel:${r.phone}`;
  } else {
    phoneRow.style.display = 'none';
  }

  bsModal.show();
  const m = maps[currentLoc];
  if (m) {
    m.flyTo([r.lat, r.lng], 17, { duration: 0.8 });
    setTimeout(() => markerMaps[currentLoc]?.[r.id]?.openPopup(), 900);
  }
}

/* ──────────────────────────────────────────
   위치 탭 전환
────────────────────────────────────────── */
document.querySelectorAll('.loc-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    if (tab.dataset.loc === currentLoc) return;

    document.querySelectorAll('.loc-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`map-${currentLoc}`).style.display = 'none';

    currentLoc    = tab.dataset.loc;
    currentFilter = '전체';
    lastPickedId  = null;

    const mapEl = document.getElementById(`map-${currentLoc}`);
    mapEl.style.display = '';
    initMap(currentLoc);
    setTimeout(() => maps[currentLoc]?.invalidateSize(), 80);

    renderFilters();
    renderCards();

    document.querySelectorAll('.card-picked').forEach(c => c.classList.remove('card-picked'));
    const slot = document.getElementById('pickSlot');
    slot.classList.remove('spinning','landed');
    const slotText = document.getElementById('pickSlotText');
    slotText.textContent = '여기에 오늘의 픽이 표시돼요';
    slotText.style.opacity = '0.3';
    document.getElementById('btnPick').textContent = '🎲 오늘의 점심 랜덤 픽!';
  });
});

/* ──────────────────────────────────────────
   랜덤 픽 룰렛
────────────────────────────────────────── */
document.getElementById('btnPick').addEventListener('click', startRoulette);

function startRoulette() {
  const btn      = document.getElementById('btnPick');
  const slot     = document.getElementById('pickSlot');
  const slotText = document.getElementById('pickSlotText');
  const loc      = LOCATIONS[currentLoc];

  currentFilter = '전체';
  renderFilters();
  renderCards();
  loc.restaurants.forEach(r => {
    const mk = markerMaps[currentLoc]?.[r.id];
    if (mk && maps[currentLoc] && !maps[currentLoc].hasLayer(mk)) maps[currentLoc].addLayer(mk);
  });

  document.querySelectorAll('.card-picked').forEach(c => c.classList.remove('card-picked'));
  document.getElementById('modalHead').classList.remove('is-pick');

  btn.disabled = true;
  btn.textContent = '🎰 뽑는 중...';
  slot.classList.add('spinning');
  slot.classList.remove('landed');
  slotText.style.opacity = '1';

  const steps = [];
  for (let i=0;i<12;i++) steps.push(70);
  for (let i=0;i<6; i++) steps.push(100+i*40);
  for (let i=0;i<4; i++) steps.push(280+i*60);
  steps.push(500);

  const pool = lastPickedId != null && loc.restaurants.length > 1
    ? loc.restaurants.filter(r => r.id !== lastPickedId)
    : loc.restaurants;
  const picked = pool[Math.floor(Math.random() * pool.length)];

  let idx = 0;
  function tick() {
    if (idx < steps.length - 1) {
      slotText.textContent = loc.restaurants[Math.floor(Math.random()*loc.restaurants.length)].name;
      idx++;
      setTimeout(tick, steps[idx]);
    } else {
      slot.classList.remove('spinning');
      slot.classList.add('landed');
      slotText.textContent = `🎯 ${picked.name}`;
      btn.textContent  = '🎲 다시 뽑기';
      btn.disabled     = false;
      lastPickedId     = picked.id;

      setTimeout(() => {
        const card = document.querySelector(`.restaurant-card[data-id="${picked.id}"]`);
        if (card) { card.classList.add('card-picked'); card.scrollIntoView({ behavior:'smooth', block:'center' }); }
        document.getElementById('modalHead').classList.add('is-pick');
        openModal(picked);
      }, 350);
    }
  }
  setTimeout(tick, steps[0]);
}

/* ──────────────────────────────────────────
   초기 렌더링
────────────────────────────────────────── */
initMap('sejong');
renderFilters();
renderCards();
</script>
